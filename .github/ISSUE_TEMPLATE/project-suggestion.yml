name: Project suggestion
description: Suggest a Native SDK project for maintainers to review
title: "Suggestion: "
labels:
  - suggestion
body:
  - type: markdown
    attributes:
      value: |
        Use this form when you found a project but cannot open a pull request. Read the [curation rules](https://github.com/henryoman/awesome-vercel-native/blob/main/rules.md) before submitting. Generic Zig and frontend libraries are outside this list's scope. Project owners should normally follow the contribution guide and submit a pull request.
  - type: input
    id: name
    attributes:
      label: Project name
      placeholder: Example App
    validations:
      required: true
  - type: dropdown
    id: library_scope
    attributes:
      label: Library or package scope
      description: Libraries and packages qualify only when their main purpose is extending Native SDK.
      options:
        - Not a library or package
        - Native SDK-specific library or package
        - Not sure
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Canonical public URL
      description: Link to the source repository or primary project page. For a skill, link directly to its canonical SKILL.md.
      placeholder: https://github.com/owner/repository
    validations:
      required: true
  - type: dropdown
    id: section
    attributes:
      label: Suggested section
      options:
        - Apps
        - Examples
        - Framework Integrations
        - Libraries & Packages
        - Skills
        - Theme Packs
        - Tooling
        - Not sure
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What it does
      description: Describe the project and the value it provides to Native SDK users.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Native SDK evidence
      description: Link to an app.zon, dependency, source file, documentation, screenshot, or release that confirms the project uses Vercel Labs Native SDK.
    validations:
      required: true
  - type: checkboxes
    id: relationship
    attributes:
      label: Relationship
      options:
        - label: I own or maintain this project.
  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: The project and evidence are publicly accessible without signing in.
          required: true
        - label: The project is documented and is more than an empty scaffold, placeholder, or announcement.
          required: true
        - label: I read `rules.md` and confirmed the project fits this list's Native SDK-specific scope.
          required: true
        - label: I searched the README and confirmed the project is not already listed.
          required: true
